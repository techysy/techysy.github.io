<head>
	<meta charset="utf-8">
	<title>{% if page.title %}{{page.title}} - {{site.title}}{% else %}{{site.title}}{% endif %}</title>
	<meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
	<meta name="keywords" content="{% if page.keywords %}{{ page.keywords }}{% else %}{{ site.keywords }}{% endif %}">
	<meta name="author" content="{{ site.author }}">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
	
	<!-- Open Graph -->
	<meta property="og:title" content="{% if page.title %}{{ page.title }} - {{ site.title }}{% else %}{{ site.title }}{% endif %}">
	<meta property="og:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
	<meta property="og:url" content="{{ site.url }}{{ page.url }}">
	<meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}">
	<meta property="og:image" content="{% if page.img %}{{ site.url }}/assets/img/{{ page.img }}{% else %}{{ site.url }}/assets/img/LMStudio.png{% endif %}">
	<meta property="og:site_name" content="{{ site.title }}">
	<meta property="og:locale" content="zh_CN">
	{% if page.layout == 'post' %}
	<meta property="article:published_time" content="{{ page.date | date_to_xmlschema }}">
	<meta property="article:modified_time" content="{{ page.last_modified_at | default: page.date | date_to_xmlschema }}">
	{% for tag in page.tags %}
	<meta property="article:tag" content="{{ tag }}">
	{% endfor %}
	{% endif %}
	
	<!-- Twitter Card -->
	<meta name="twitter:card" content="summary_large_image">
	<meta name="twitter:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
	<meta name="twitter:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
	<meta name="twitter:image" content="{% if page.img %}{{ site.url }}/assets/img/{{ page.img }}{% else %}{{ site.url }}/assets/img/LMStudio.png{% endif %}">
	<meta name="twitter:site" content="@yushiyang">
	<meta name="twitter:creator" content="@yushiyang">
	
	<!-- Favicon -->
	<link rel="shortcut icon" href="{{ "/assets/img/favicon/favicon.ico" | prepend: site.baseurl }}" type="image/x-icon">
	<link rel="apple-touch-icon" href="{{ "/assets/img/favicon/apple-touch-icon.png" | prepend: site.baseurl }}">
	<link rel="apple-touch-icon" sizes="72x72" href="{{ "/assets/img/favicon/apple-touch-icon-72x72.png" | prepend: site.baseurl }}">
	<link rel="apple-touch-icon" sizes="114x114" href="{{ "/assets/img/favicon/apple-touch-icon-114x114.png" | prepend: site.baseurl }}">
	
	<!-- Theme Color -->
	<meta name="theme-color" content="#311e3e">
	<meta name="msapplication-navbutton-color" content="#311e3e">
	<meta name="apple-mobile-web-app-status-bar-style" content="#311e3e">
	
	<!-- Preconnect for fonts -->
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	
	<!-- Google Fonts with display swap -->
	<link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
	
	<!-- iconfont -->
	<link href="https://at.alicdn.com/t/c/font_1552078_bypbl0pe19q.css" rel="stylesheet" type="text/css">
	
	<!-- Font Awesome -->
	<link rel="stylesheet" href="{{ "/assets/fonts/font-awesome/css/font-awesome.min.css" | prepend: site.baseurl }}">
	
	<!-- Main CSS -->
	<link rel="stylesheet" href="{{ "/assets/css/main.css" | prepend: site.baseurl }}">
	
	<!-- Baidu Site Verification -->
	<meta name="baidu-site-verification" content="ZISdf60C3y" />
	
	<!-- Canonical URL -->
	<link rel="canonical" href="{{ site.url }}{{ page.url }}">
	
	<!-- JSON-LD Structured Data -->
	{% if page.layout == 'post' %}
	<script type="application/ld+json">
	{
		"@context": "https://schema.org",
		"@type": "BlogPosting",
		"mainEntityOfPage": {
			"@type": "WebPage",
			"@id": "{{ site.url }}{{ page.url }}"
		},
		"headline": "{{ page.title }}",
		"image": "{{ site.url }}/assets/img/{{ page.img }}",
		"datePublished": "{{ page.date | date_to_xmlschema }}",
		"dateModified": "{{ page.last_modified_at | default: page.date | date_to_xmlschema }}",
		"author": {
			"@type": "Person",
			"name": "{{ site.author }}",
			"url": "{{ site.url }}/about"
		},
		"publisher": {
			"@type": "Person",
			"name": "{{ site.author }}",
			"logo": {
				"@type": "ImageObject",
				"url": "{{ site.url }}/assets/img/{{ site.author-pic }}"
			}
		},
		"description": "{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}",
		"keywords": "{% if page.keywords %}{{ page.keywords }}{% else %}{{ site.keywords }}{% endif %}",
		"articleBody": "{{ page.content | strip_html | truncatewords: 100 | escape }}"
	}
	</script>
	{% else %}
	<script type="application/ld+json">
	{
		"@context": "https://schema.org",
		"@type": "WebSite",
		"name": "{{ site.title }}",
		"url": "{{ site.url }}",
		"description": "{{ site.description }}",
		"author": {
			"@type": "Person",
			"name": "{{ site.author }}",
			"url": "{{ site.url }}/about"
		},
		"potentialAction": {
			"@type": "SearchAction",
			"target": "{{ site.url }}/?s={search_term_string}",
			"query-input": "required name=search_term_string"
		}
	}
	</script>
	{% endif %}
</head>
